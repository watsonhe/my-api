<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Crimson Studio{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <nav class="nav">
    <a href="{{ url_for('home') }}" class="nav__brand">Crimson Studio</a>
    <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__links">
      <li><a href="{{ url_for('home') }}">Blog</a></li>
      <li><a href="{{ url_for('daily_brief') }}">Daily Brief</a></li>
      <li><a href="{{ url_for('admin') }}">Admin</a></li>
    </ul>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Crafted with <span class="footer__dot"></span> in {{ current_year }}</span>
    <span>Crimson Studio</span>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
