{% extends "base.html" %}
{% block title %}{{ t('e404_code') }} — {{ t('site_name') }}{% endblock %}

{% block content %}
<div class="not-found">
  <div class="not-found__code">{{ t('e404_code') }}</div>
  <h1 class="not-found__title">{{ t('e404_title') }}</h1>
  <p class="not-found__text">{{ t('e404_text') | safe }}</p>
  <a href="{{ url_for('home') }}" class="btn">{{ t('e404_home') }}</a>
</div>
{% endblock %}
