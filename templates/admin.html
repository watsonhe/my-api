{% extends "base.html" %}
{% block title %}Admin — Crimson Studio{% endblock %}

{% block content %}
<div class="admin">
  <h1>New Post</h1>
  <p class="admin__subtitle">Compose in plain text. Newlines become line breaks.</p>

  {% if error %}
    <div class="admin__error">{{ error }}</div>
  {% endif %}

  <form method="post" class="admin__form">
    <div>
      <label for="title">Title</label>
      <input type="text" id="title" name="title" required autofocus
             placeholder="The art of slow writing">
    </div>

    <div>
      <label for="excerpt">Excerpt <span>(optional short description)</span></label>
      <textarea id="excerpt" name="excerpt" rows="2"
                placeholder="A meditation on craft, patience, and why good words take time."></textarea>
    </div>

    <div>
      <label for="content">Content</label>
      <textarea id="content" name="content" rows="20" required
                placeholder="Your words here. Each new line becomes a paragraph."></textarea>
    </div>

    <button type="submit" class="btn">Publish</button>
  </form>
</div>
{% endblock %}
